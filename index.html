<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CowboyHatVR</title>
<link rel="icon" href="favicon.png">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0a0f1a;
  color:#fff;
}

/* TOPBAR */
.topbar{
  position:sticky;
  top:0;
  z-index:100;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px;
  background:rgba(10,15,30,0.9);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  width:32px;
  height:32px;
  border-radius:8px;
}

.logo span{
  font-weight:bold;
  letter-spacing:1px;
}

.top-actions{
  display:flex;
  gap:10px;
}

.btn{
  padding:8px 12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  color:#fff;
  text-decoration:none;
  font-size:14px;
}

.btn:hover{
  background:rgba(255,255,255,0.1);
}

/* MENU */
.menu-btn{
  font-size:20px;
  cursor:pointer;
  padding:6px;
}

.dropdown{
  position:fixed;
  top:0;
  left:0;
  width:240px;
  height:100%;
  background:#0f1724;
  transform:translateX(-100%);
  transition:0.3s;
  padding:20px;
  z-index:200;
}

.dropdown.open{
  transform:translateX(0);
}

.dropdown a{
  display:block;
  margin-bottom:15px;
  text-decoration:none;
  color:#fff;
  padding:10px;
  border-radius:8px;
  background:rgba(255,255,255,0.05);
}

.dropdown a:hover{
  background:rgba(255,255,255,0.1);
}

/* CONTENT */
.container{
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
}

.profile{
  display:flex;
  align-items:center;
  gap:15px;
}

.profile img{
  width:70px;
  height:70px;
  border-radius:50%;
}

.profile h2{
  margin:0;
}

/* BOTTOM */
.bottom{
  padding:20px;
  text-align:center;
  border-top:1px solid rgba(255,255,255,0.08);
  margin-top:40px;
}

.bottom a{
  display:inline-block;
  margin:8px;
  padding:10px 14px;
  border-radius:10px;
  background:rgba(255,255,255,0.06);
  text-decoration:none;
  color:#fff;
}

.bottom a:hover{
  background:rgba(255,255,255,0.12);
}
</style>
</head>

<body>

  <a href="https://discord.gg/csty99p5AS">Clan Server</a>
